<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spinning Blade</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Mencegah layar HP bergeser/scrolling saat main */
        }

        body {
            background-color: #0b031a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        
        .game-outer-frame {
            padding: 10px;
            background: linear-gradient(135deg, #9d4edd, #00b4d8);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.6), 0 0 50px rgba(0, 180, 216, 0.4);
            position: relative;
            max-width: 100vw;
            max-height: 100vh;
        }

        .game-inner-frame {
            border: 4px solid #e0aaff;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background-color: #12052d;
            /* Menggunakan aspek rasio fleksibel agar pas di layar HP */
            width: 800px;
            height: 600px;
            max-width: 100%;
        }

        canvas {
            display: block;
            background: radial-gradient(circle, #1a0933 0%, #0b031a 100%);
            width: 100%;
            height: 100%;
        }

        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 3, 26, 0.9);
            color: #fff;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 2.5rem;
            color: #9d4edd;
            text-shadow: 0 0 10px #9d4edd, 0 0 20px #00b4d8;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 2.2rem;
            color: #ff4d6d;
            text-shadow: 0 0 15px #ff4d6d;
            margin-bottom: 15px;
        }

        .instructions {
            background: rgba(0, 180, 216, 0.1);
            border: 2px solid #00b4d8;
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 20px;
            max-width: 90%;
        }

        .instructions p {
            font-size: 0.95rem;
            color: #e0aaff;
            margin: 6px 0;
            line-height: 1.3;
        }

        .btn {
            background: linear-gradient(90deg, #9d4edd, #00b4d8);
            border: none;
            color: white;
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 180, 216, 0.5);
            text-transform: uppercase;
        }

        .score-display {
            font-size: 1.1rem;
            color: #00b4d8;
            margin-bottom: 20px;
        }

        .score-display span {
            color: #fff;
            font-weight: bold;
        }

        
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            h2 { font-size: 1.6rem; }
            .instructions p { font-size: 0.85rem; }
            .btn { padding: 10px 25px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="game-outer-frame">
        <div class="game-inner-frame">
            
            <div id="startScreen" class="overlay">
                <h1>Blade Survivor</h1>
                <p style="color: #00b4d8; margin-bottom: 15px; font-size: 0.9rem;">Ultimate Blade Storm</p>
                
                <div class="instructions">
                    <p><strong>[ HOW TO PLAY ]</strong></p>
                    <p>• <b>PC:</b> Use <b>W, A, S, D</b> or <b>Arrow Keys</b> to move.</p>
                    <p>• <b>MOBILE:</b> Touch & Drag the <b>On-Screen Joystick</b>.</p>
                    <p>• Protect your center body from enemies!</p>
                </div>
                
                <button class="btn" id="startBtn">Start Game</button>
            </div>

            <div id="gameOverScreen" class="overlay hidden">
                <h2>GAME OVER</h2>
                <div class="score-display">
                    <p>Your Score: <span id="finalScore">0</span></p>
                    <p>High Score: <span id="highScore">0</span></p>
                </div>
                <button class="btn" id="restartBtn">Play Again</button>
            </div>

            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const finalScoreTxt = document.getElementById('finalScore');
        const highScoreTxt = document.getElementById('highScore');

        
        let gameActive = false;
        let score = 0;
        let localHighScore = localStorage.getItem('blade_highScore') || 0;

        
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        
        const joystick = {
            active: false,
            startX: 0,
            startY: 0,
            currentX: 0,
            currentY: 0,
            touchId: null,
            maxRadius: 50,  // Batas maksimal seretan analog
            moveX: 0,       // Nilai -1 sampai 1 untuk pergerakan horizontal
            moveY: 0        // Nilai -1 sampai 1 untuk pergerakan vertikal
        };

        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start(); osc.stop(audioCtx.currentTime + 0.6);
            } else if (type === 'start') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // Entities
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 16;
                this.speed = 4.5;
                this.baseAngle = 0;
                this.bladeCount = 5;
                this.bladeDistance = 60;
                this.bladeRadius = 14;
                this.bladeSpeed = 0.06;
            }

            update() {
                // 1. Pergerakan PC (Keyboard)
                if (keys.w || keys.ArrowUp) this.y -= this.speed;
                if (keys.s || keys.ArrowDown) this.y += this.speed;
                if (keys.a || keys.ArrowLeft) this.x -= this.speed;
                if (keys.d || keys.ArrowRight) this.x += this.speed;

                // 2. Pergerakan HP (Joystick)
                if (joystick.active) {
                    this.x += joystick.moveX * this.speed;
                    this.y += joystick.moveY * this.speed;
                }

                // Batasan Layar
                if (this.x < this.radius) this.x = this.radius;
                if (this.x > canvas.width - this.radius) this.x = canvas.width - this.radius;
                if (this.y < this.radius) this.y = this.radius;
                if (this.y > canvas.height - this.radius) this.y = canvas.height - this.radius;

                this.baseAngle += this.bladeSpeed;
            }

            draw() {
                // Player Center
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00b4d8';
                ctx.shadowColor = '#00b4d8';
                ctx.shadowBlur = 15;
                ctx.fill();
                ctx.closePath();

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                ctx.closePath();

                // Orbit Line
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.bladeDistance, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(157, 78, 221, 0.15)';
                ctx.lineWidth = 1;
                ctx.shadowBlur = 0;
                ctx.stroke();
                ctx.closePath();

                // 5 Blades
                let positions = this.getBladePositions();
                positions.forEach((pos, index) => {
                    ctx.save();
                    ctx.translate(pos.x, pos.y);
                    ctx.rotate(this.baseAngle * 4 + (index * Math.PI / 2)); 

                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        ctx.lineTo(0, -this.bladeRadius);
                        ctx.lineTo(this.bladeRadius * 0.25, -this.bladeRadius * 0.25);
                        ctx.rotate(Math.PI / 2);
                    }
                    ctx.closePath();
                    
                    ctx.fillStyle = '#9d4edd';
                    ctx.shadowColor = '#9d4edd';
                    ctx.shadowBlur = 18;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                    ctx.restore();
                });
                ctx.shadowBlur = 0;
            }

            getBladePositions() {
                let positions = [];
                for (let i = 0; i < this.bladeCount; i++) {
                    let angle = this.baseAngle + (i * (Math.PI * 2 / this.bladeCount));
                    positions.push({
                        x: this.x + Math.cos(angle) * this.bladeDistance,
                        y: this.y + Math.sin(angle) * this.bladeDistance
                    });
                }
                return positions;
            }
        }

        class Enemy {
            constructor() {
                if (Math.random() < 0.5) {
                    this.x = Math.random() < 0.5 ? -30 : canvas.width + 30;
                    this.y = Math.random() * canvas.height;
                } else {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() < 0.5 ? -30 : canvas.height + 30;
                }
                this.radius = 12 + Math.random() * 6;
                this.speed = 1.3 + (Math.random() * 1.5) + (score * 0.015);
                this.color = Math.random() < 0.5 ? '#7209b7' : '#48cae4';
            }
            update(playerX, playerY) {
                let dx = playerX - this.x;
                let dy = playerY - this.y;
                let dist = Math.hypot(dx, dy);
                if (dist > 0) {
                    this.x += (dx / dist) * this.speed;
                    this.y += (dy / dist) * this.speed;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.closePath();
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 4, this.y - 3, 2, 2);
                ctx.fillRect(this.x + 2, this.y - 3, 2, 2);
                ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6;
                this.alpha = 1;
                this.decay = Math.random() * 0.03 + 0.02;
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= this.decay; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
        }

        let player;
        let enemies = [];
        let particles = [];
        let spawnInterval;

        function initGame() {
            player = new Player(canvas.width / 2, canvas.height / 2);
            enemies = [];
            particles = [];
            score = 0;
            gameActive = true;
            joystick.active = false;

            clearInterval(spawnInterval);
            spawnInterval = setInterval(() => {
                if(gameActive) enemies.push(new Enemy());
            }, 650);
        }

        function triggerExplosion(x, y, color) {
            for (let i = 0; i < 12; i++) particles.push(new Particle(x, y, color));
        }

        function gameOver() {
            gameActive = false;
            clearInterval(spawnInterval);
            playSound('gameover');
            if (score > localHighScore) {
                localHighScore = score;
                localStorage.setItem('blade_highScore', localHighScore);
            }
            finalScoreTxt.innerText = score;
            highScoreTxt.innerText = localHighScore;
            gameOverScreen.classList.remove('hidden');
        }

        // FUNGSI MENGGAMBAR JOYSTICK DI LAYAR HP
        function drawJoystick() {
            if (!joystick.active) return;

            // Base Luar Analog (Transparan Abu-abu)
            ctx.save();
            ctx.beginPath();
            ctx.arc(joystick.startX, joystick.startY, joystick.maxRadius, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.08)";
            ctx.strokeStyle = "rgba(0, 180, 216, 0.4)";
            ctx.lineWidth = 3;
            ctx.fill();
            ctx.stroke();

            // Tombol Tengah Analog (Biru Muda Neon)
            ctx.beginPath();
            ctx.arc(joystick.currentX, joystick.currentY, 22, 0, Math.PI * 2);
            ctx.fillStyle = "#00b4d8";
            ctx.shadowColor = "#00b4d8";
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.restore();
        }

        function animate() {
            ctx.fillStyle = 'rgba(11, 3, 26, 0.35)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                player.update();
                player.draw();

                let bladePositions = player.getBladePositions();

                // Handle Enemies
                for (let i = enemies.length - 1; i >= 0; i--) {
                    let enemy = enemies[i];
                    enemy.update(player.x, player.y);
                    enemy.draw();

                    let destroyed = false;
                    for (let b = 0; b < bladePositions.length; b++) {
                        let bp = bladePositions[b];
                        let distToBlade = Math.hypot(bp.x - enemy.x, bp.y - enemy.y);
                        
                        if (distToBlade < player.bladeRadius + enemy.radius) {
                            triggerExplosion(enemy.x, enemy.y, enemy.color);
                            playSound('hit');
                            enemies.splice(i, 1);
                            score += 10;
                            destroyed = true;
                            break;
                        }
                    }

                    if (destroyed) continue;

                    let distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                    if (distToPlayer < player.radius + enemy.radius) {
                        triggerExplosion(player.x, player.y, '#ff4d6d');
                        gameOver();
                    }
                }

                // Handle Particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    if (particles[i].alpha <= 0) particles.splice(i, 1);
                    else particles[i].draw();
                }

                // Render Joystick di atas game canvas jika aktif
                drawJoystick();

                // Score HUD
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = '#00b4d8';
                ctx.shadowBlur = 5;
                ctx.font = "bold 20px 'Segoe UI', Arial";
                ctx.fillText(`SCORE: ${score}`, 25, 35);
                ctx.fillStyle = '#00b4d8';
                ctx.fillText(`BEST: ${localHighScore}`, 25, 65);
                ctx.shadowBlur = 0;
            }
            requestAnimationFrame(animate);
        }

        // EVENT LISTENERS PC (Keyboard)
        window.addEventListener('keydown', (e) => { if(e.key in keys) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(e.key in keys) keys[e.key] = false; });

        // EVENT LISTENERS MOBILE (Touch System untuk Joystick)
        function getCanvasTouchPos(touch) {
            const rect = canvas.getBoundingClientRect();
            // Kalkulasi rasio ukuran canvas asli (800x600) terhadap ukuran layar HP saat itu
            return {
                x: (touch.clientX - rect.left) * (canvas.width / rect.width),
                y: (touch.clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        canvas.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            
            // Mengambil touch pertama yang masuk ke layar game
            const touch = e.changedTouches[0];
            const pos = getCanvasTouchPos(touch);

            // Kita munculkan joystick di area mana saja asal di sebelah kiri layar
            if (pos.x < canvas.width / 2) {
                joystick.active = true;
                joystick.touchId = touch.identifier;
                joystick.startX = pos.x;
                joystick.startY = pos.y;
                joystick.currentX = pos.x;
                joystick.currentY = pos.y;
                joystick.moveX = 0;
                joystick.moveY = 0;
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            e.preventDefault();

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === joystick.touchId) {
                    const pos = getCanvasTouchPos(touch);
                    
                    let dx = pos.x - joystick.startX;
                    let dy = pos.y - joystick.startY;
                    let distance = Math.hypot(dx, dy);

                    if (distance <= joystick.maxRadius) {
                        joystick.currentX = pos.x;
                        joystick.currentY = pos.y;
                    } else {
                        // Jika ditarik kejauhan, batasi posisi tombol analog di pinggir batas maxRadius
                        joystick.currentX = joystick.startX + (dx / distance) * joystick.maxRadius;
                        joystick.currentY = joystick.startY + (dy / distance) * joystick.maxRadius;
                        distance = joystick.maxRadius;
                    }

                    
                    joystick.moveX = dx / joystick.maxRadius;
                    joystick.moveY = dy / joystick.maxRadius;
                }
            }
        });

        canvas.addEventListener('touchend', (e) => {
            if (!joystick.active) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === joystick.touchId) {
                    joystick.active = false;
                    joystick.touchId = null;
                    joystick.moveX = 0;
                    joystick.moveY = 0;
                }
            }
        });

        
        startBtn.addEventListener('click', () => { startScreen.classList.add('hidden'); playSound('start'); initGame(); });
        restartBtn.addEventListener('click', () => { gameOverScreen.classList.add('hidden'); playSound('start'); initGame(); });

        requestAnimationFrame(animate);
    </script>
</body>
</html>
